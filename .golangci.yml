version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - goheader
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - makezero
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - revive
    - staticcheck
    - tparallel
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          files:
            - $all
            - '!$test'
          allow:
            - $gostd
            - github.com/provlabs/vault
            - github.com/armon/go-metrics
            - cosmossdk.io/api
            - cosmossdk.io/client/v2
            - cosmossdk.io/collections
            - cosmossdk.io/core
            - cosmossdk.io/depinject
            - cosmossdk.io/errors
            - cosmossdk.io/log
            - cosmossdk.io/math
            - cosmossdk.io/store
            - cosmossdk.io/x/circuit
            - cosmossdk.io/x/evidence
            - cosmossdk.io/x/feegrant
            - cosmossdk.io/x/tx/signing
            - cosmossdk.io/x/upgrade
            - github.com/cosmos/cosmos-db
            - github.com/cosmos/cosmos-sdk
            - github.com/cosmos/go-bip39
            - github.com/cosmos/ibc-apps
            - github.com/cosmos/ibc-go
            - github.com/CosmWasm/wasmd
            - github.com/CosmWasm/wasmvm/v2
            - github.com/cosmos/gogoproto
            - github.com/golang/protobuf/proto
            - github.com/google/uuid
            - github.com/gorilla/mux
            - github.com/grpc-ecosystem/grpc-gateway
            - github.com/hashicorp/go-metrics
            - github.com/provenance-io/provenance
            - github.com/spf13/cast
            - github.com/spf13/cobra
            - github.com/spf13/pflag
            - github.com/spf13/viper
            - github.com/stretchr/testify/require
            - github.com/stretchr/testify/assert
            - github.com/stretchr/testify/suite
            - github.com/cometbft/cometbft/abci/types
            - github.com/cometbft/cometbft/config
            - github.com/cometbft/cometbft/crypto
            - github.com/cometbft/cometbft/crypto/tmhash
            - github.com/cometbft/cometbft/libs/cli
            - github.com/cometbft/cometbft/libs/json
            - github.com/cometbft/cometbft/libs/os
            - github.com/cometbft/cometbft/libs/rand
            - github.com/cometbft/cometbft/proto/tendermint/types
            - github.com/cometbft/cometbft/rpc/jsonrpc/types
            - github.com/cometbft/cometbft/types
            - github.com/cometbft/cometbft/types/time
            - github.com/cometbft/cometbft-db
            - github.com/rs/zerolog
            - sigs.k8s.io/yaml
            - google.golang.org/grpc/codes
            - google.golang.org/grpc/status
            - google.golang.org/protobuf/proto
            - google.golang.org/protobuf/protoadapt
          deny:
            - pkg: github.com/cosmos/cosmos-sdk/x/params
              desc: The params module is no more.
        test:
          files:
            - $test
          allow:
            - $gostd
            - github.com/stretchr/testify
    dogsled:
      max-blank-identifiers: 3
    errcheck:
      exclude-functions:
        - (fmt.State).Write
    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    misspell:
      locale: US
      ignore-rules:
        - cancelled
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        text: Use of weak random number generator
      - linters:
          - gosec
        path: simulation/operations\.go
        text: 'G101: Potential hardcoded credentials'
      # Simulation code performs many bounded int conversions on random values;
      # integer-overflow conversions there are not a consensus concern.
      - linters:
          - gosec
        path: ^simulation/
        text: 'G115:'
      - linters:
          - revive
        text: comment on exported var
      - linters:
          - revive
        text: don't use an underscore in package name
      - linters:
          - revive
        text: don't use underscores in Go names; const (TxEndpoint|TLCategory|TLType|TLAction)_
      - linters:
          - staticcheck
        text: 'ST1003:'
      # The module must keep implementing its own deprecated payment-denom and
      # direct-principal surface until it is removed; the deprecation warnings
      # are aimed at external integrators, not this repo's internals.
      - linters:
          - staticcheck
        text: 'SA1019: .*(removed in a future release|removed with the mixed-denom vault concept)'
      - linters:
          - revive
        text: don't use leading k in Go names
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/cometbft)
        - prefix(cosmossdk.io)
        - prefix(github.com/cosmos)
        - prefix(github.com/provenance-io)
        - blank
        - dot
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
