syntax = "proto3";
package provlabs.vault.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/provlabs/vault/types";

// AssetNAV represents the Net Asset Value of a specific asset within a vault.
// This can be a fungible token (denom) or a non-fungible asset (Scope ID).
message AssetNAV {
  // vault_address is the address of the vault this NAV belongs to.
  string vault_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // asset_id is the unique identifier for the asset (e.g., denom or Scope ID).
  string asset_id = 2;

  // price is the value of one unit of the asset expressed in the vault's underlying_asset.
  cosmos.base.v1beta1.Coin price = 3 [(gogoproto.nullable) = false];

  // volume is the number of units the price applies to (default is 1).
  uint64 volume = 4;

  // updated_block_height is the block height when this NAV was last updated.
  int64 updated_block_height = 5;
}
